name: CI

# Runs on every push and PR. The deploy workflow runs only when CI passes.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    env:
      # Bare-minimum env so settings.py boots in CI. The real production
      # secrets live in Render — we never need them here.
      DJANGO_DEBUG: "1"
      DJANGO_SECRET_KEY: "ci-secret-key-not-used-anywhere-real"
      LLM_API_URL: "http://127.0.0.1:7860"
      LLM_API_NAME: "/generate"
      GROQ_API_KEY: ""

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Django system check
        run: python manage.py check

      - name: Run test suite
        run: python manage.py test accounts.tests chat.tests --verbosity 2

      - name: Production deploy check (informational)
        run: |
          DJANGO_DEBUG=0 \
          DJANGO_SECRET_KEY="$(python -c 'import secrets; print(secrets.token_urlsafe(64))')" \
          DJANGO_ALLOWED_HOSTS="example.com" \
          python manage.py check --deploy --fail-level WARNING || true
