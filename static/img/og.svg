<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="holo" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"  stop-color="#FF3CAC"/>
      <stop offset="40%" stop-color="#784BA0"/>
      <stop offset="80%" stop-color="#2B86C5"/>
      <stop offset="100%" stop-color="#C77DFF"/>
    </linearGradient>
    <radialGradient id="wash1" cx="20%" cy="20%" r="60%">
      <stop offset="0%"  stop-color="#FF3CAC" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#FF3CAC" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="wash2" cx="85%" cy="80%" r="60%">
      <stop offset="0%"  stop-color="#2B86C5" stop-opacity="0.30"/>
      <stop offset="100%" stop-color="#2B86C5" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M 48 0 L 0 0 0 48" fill="none" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1200" height="630" fill="#000"/>
  <rect width="1200" height="630" fill="url(#wash1)"/>
  <rect width="1200" height="630" fill="url(#wash2)"/>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <!-- Sigil right side -->
  <g transform="translate(940 320)" opacity="0.55">
    <circle r="220" fill="none" stroke="url(#holo)" stroke-width="1" stroke-dasharray="2 7"/>
    <circle r="180" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="1" stroke-dasharray="22 8 4 8"/>
    <circle r="140" fill="none" stroke="url(#holo)" stroke-width="0.6" opacity="0.6"/>
    <line x1="0" y1="0" x2="0" y2="-200" stroke="url(#holo)" stroke-width="2"/>
    <circle cx="0" cy="-140" r="3" fill="#FF3CAC"/>
    <circle r="3" fill="#fff"/>
    <circle r="22" fill="none" stroke="url(#holo)" stroke-width="0.6"/>
  </g>

  <!-- Brand -->
  <g transform="translate(80 220)">
    <g font-family="'Inter', sans-serif">
      <text font-size="22" letter-spacing="6" fill="#C77DFF" font-weight="500">CLASSIFIED // RESEARCH PREVIEW</text>
    </g>
  </g>

  <g transform="translate(80 320)" font-family="'Space Grotesk', 'Inter', sans-serif">
    <text font-size="84" font-weight="700" fill="#F4F4F6" letter-spacing="-3">Adversarial code,</text>
    <text y="92" font-size="84" font-weight="700" fill="url(#holo)" letter-spacing="-3">generated on demand.</text>
  </g>

  <g transform="translate(80 530)" font-family="'Inter', sans-serif">
    <text font-size="22" fill="#B0B0BB">LLM-driven malware generation for proactive AV research.</text>
  </g>

  <!-- Brand mark top-left -->
  <g transform="translate(80 70)">
    <path d="M0 0 L36 0 L18 18 Z" fill="url(#holo)"/>
    <path d="M22 28 L58 28 L40 46 Z" fill="url(#holo)" opacity="0.85"/>
    <text x="80" y="32" font-family="'Space Grotesk', 'Inter', sans-serif"
          font-size="22" font-weight="700" fill="#F4F4F6" letter-spacing="0">DARK</text>
    <text x="142" y="32" font-family="'Space Grotesk', 'Inter', sans-serif"
          font-size="22" font-weight="700" fill="#C77DFF">//</text>
    <text x="172" y="32" font-family="'Space Grotesk', 'Inter', sans-serif"
          font-size="22" font-weight="700" fill="#F4F4F6">PROMPT</text>
  </g>
</svg>
